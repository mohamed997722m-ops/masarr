<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- subtle inner glow -->
  <rect width="512" height="512" rx="110" fill="none" stroke="rgba(74,222,128,0.15)" stroke-width="3"/>
  <!-- outer hexagon ring -->
  <polygon points="256,40 440,148 440,364 256,472 72,364 72,148"
    fill="none" stroke="rgba(74,222,128,0.2)" stroke-width="3"/>
  <!-- inner hexagon -->
  <polygon points="256,90 400,170 400,342 256,422 112,342 112,170"
    fill="rgba(74,222,128,0.06)" stroke="rgba(74,222,128,0.15)" stroke-width="2"/>
  <!-- Arabic م (meem) as main letter -->
  <text x="256" y="310" text-anchor="middle"
    font-family="Georgia, serif" font-size="240" font-weight="bold"
    fill="url(#g)">م</text>
  <!-- decorative corner dots -->
  <circle cx="140" cy="140" r="6" fill="rgba(74,222,128,0.4)"/>
  <circle cx="372" cy="140" r="6" fill="rgba(20,184,166,0.4)"/>
  <circle cx="140" cy="372" r="6" fill="rgba(20,184,166,0.4)"/>
  <circle cx="372" cy="372" r="6" fill="rgba(74,222,128,0.4)"/>
</svg>